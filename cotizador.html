// ─── DISTANCE ───────────────────────────────────────────────────────
function hav(lat1, lng1, lat2, lng2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ─── STATE ──────────────────────────────────────────────────────────
let selectedPueblo = null;

// ─── INIT ───────────────────────────────────────────────────────────
const materialSelect = document.getElementById('material');
MATERIALS.forEach(m => {
  const opt = document.createElement('option');
  opt.value = m; opt.textContent = m;
  materialSelect.appendChild(opt);
});

// ─── PUEBLO SEARCH ──────────────────────────────────────────────────
function filterPueblos() {
  selectedPueblo = null;
  const val = document.getElementById('puebloInput').value.toLowerCase();
  const drop = document.getElementById('puebloDrop');
  if (!val) { drop.classList.add('hidden'); return; }
  const matches = PUEBLOS.filter(p => p.name.toLowerCase().includes(val));
  drop.innerHTML = matches.length
    ? matches.map(p => `<div class="pueblo-item" onmousedown="selectPueblo('${p.name}')">${p.name}</div>`).join('')
    : '<div class="pueblo-item" style="color:#4b5e73;cursor:default">No encontrado</div>';
  drop.classList.remove('hidden');
  calculate();
}
function selectPueblo(name) {
  document.getElementById('puebloInput').value = name;
  selectedPueblo = name;
  document.getElementById('puebloDrop').classList.add('hidden');
  calculate();
}
function showPuebloList() {
  if (selectedPueblo) {
    document.getElementById('puebloInput').value = '';
    selectedPueblo = null;
  }
  filterPueblos();
}
function hidePuebloList() {
  document.getElementById('puebloDrop').classList.add('hidden');
  if (!selectedPueblo) {
    document.getElementById('puebloInput').value = '';
    calculate();
  }
}

// ─── CALCULATE ──────────────────────────────────────────────────────
function calculate() {
  const material = document.getElementById('material').value;
  const qty = Number(document.getElementById('quantity').value);
  const pueblo = selectedPueblo;

  updateSteps(material, pueblo, qty);

  const resultCard = document.getElementById('resultCard');
  const waWrap = document.getElementById('waWrap');
  const disc = document.getElementById('disclaimer');
  const minMsg = document.getElementById('minMsg');
  const footer = document.getElementById('footer');

  resultCard.classList.add('hidden');
  waWrap.classList.add('hidden');
  disc.classList.add('hidden');
  minMsg.classList.add('hidden');
  footer.style.display = '';

  if (!material || !pueblo || !qty || qty <= 0) return;
  if (qty < 10) { minMsg.classList.remove('hidden'); return; }

  const dest = PUEBLOS.find(p => p.name === pueblo);
  if (!dest) return;

  const trips = qty <= 18 ? 1 : Math.ceil(qty / 18);
  const quarries = QUARRIES.filter(q => q.material === material);

  const options = quarries.map(q => {
    const yardToQ = hav(YARD.lat, YARD.lng, q.lat, q.lng) * dest.rf;
    const rawQToDest = hav(q.lat, q.lng, dest.lat, dest.lng) * dest.rf;
    const qToDest = rawQToDest < 1 ? 10 : rawQToDest;
    const miles = yardToQ + qToDest;
    const transport = miles * 4 * trips;
    const driver = 150 * trips;
    const mat = qty * q.salePrice;
    const tolls = dest.toll * 2 * trips;
    const total = Math.round((transport + driver + mat + tolls) * 100) / 100;
    return { quarry: q, total, trips, transport: Math.round(transport*100)/100, driver, mat, tolls: Math.round(tolls*100)/100 };
  });

  options.sort((a, b) => a.total - b.total);
  const best = options[0];

  // Log to Google Sheets
  logToSheet(material, pueblo, qty, best);

  const fmt = n => n.toLocaleString('en-US', { minimumFractionDigits: 2 });

  resultCard.innerHTML = `
    <div class="result-top">
      <div class="result-label">Cotización estimada</div>
      <div class="result-total">$${fmt(best.total)}</div>
    </div>
    <div class="result-body">

        <div class="result-row-left">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Material
        </div>
        <div class="result-row-val accent">${material}</div>
      </div>
      <div class="result-row">
        <div class="result-row-left">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Destino
        </div>
        <div class="result-row-val">${pueblo}</div>
      </div>
      <div class="result-row">
        <div class="result-row-left">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          Cantidad
        </div>
        <div class="result-row-val">${qty} m³</div>
      </div>
      <div class="result-row">
        <div class="result-row-left">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Viajes
        </div>
        <div class="result-row-val accent">${best.trips} viaje${best.trips > 1 ? 's' : ''}</div>
      </div>
    </div>`;
  resultCard.className = 'result';

  const waMsg = encodeURIComponent(`Hola, me interesa una cotización:\n\nMaterial: ${material}\nDestino: ${pueblo}\nCantidad: ${qty} m³\nViajes: ${best.trips}\nTotal estimado: $${fmt(best.total)}`);
  waWrap.innerHTML = `
    <a class="wa-btn" href="https://wa.me/17875852743?text=${waMsg}" target="_blank" rel="noopener noreferrer">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Solicitar Cotización
    </a>`;
  waWrap.classList.remove('hidden');
  disc.classList.remove('hidden');
  footer.style.display = 'none';
}

// ─── STEP INDICATORS ────────────────────────────────────────────────
function updateSteps(mat, pub, qty) {
  const s = [
    { done: !!mat, active: !mat },
    { done: !!pub, active: !!mat && !pub },
    { done: !!qty && qty >= 10, active: !!mat && !!pub && (!qty || qty < 10) },
  ];
  s.forEach((st, i) => {
    const dot = document.getElementById('step' + (i+1));
    const label = document.getElementById('stepLabel' + (i+1));
    dot.className = 'step-dot' + (st.done ? ' done' : st.active ? ' active' : '');
    dot.textContent = st.done ? '✓' : (i+1);
    label.className = 'step-label' + (st.done ? ' done' : st.active ? ' active' : '');
    if (i < 2) {
      const line = document.getElementById('stepLine' + (i+1));
      line.className = 'step-line' + (st.done ? ' done' : '');
    }
  });
}

// ─── LOG TO GOOGLE SHEETS ───────────────────────────────────────────
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz449LMkEwDK02ds2igKccT3md3SwVuPtnDqAyxrxRQIgAlCWvaUft9FVPJByKtJkBc/exec';
let lastLog = '';

function logToSheet(material, destino, cantidad, best) {
  // Prevent duplicate logs for same quote
  const key = material + destino + cantidad;
  if (key === lastLog) return;
  lastLog = key;

  const now = new Date();
  const fecha = now.toLocaleDateString('es-PR');
  const hora = now.toLocaleTimeString('es-PR', { hour: '2-digit', minute: '2-digit' });

  const payload = {
    fecha: fecha,
    hora: hora,
    material: material,
    destino: destino,
    cantidad: cantidad,
    viajes: best.trips,
    total: best.total,
    transporte: best.transport,
    chofer: best.driver,
    materialCost: best.mat,
    peajes: best.tolls,
    cantera: best.quarry.location
  };

  const encoded = encodeURIComponent(JSON.stringify(payload));
  const img = new Image();
  img.src = SHEET_URL + '?data=' + encoded;
}
